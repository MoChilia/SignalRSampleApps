<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Azure SignalR Refresh Auth Sample</title>
  <link rel="stylesheet" href="./site.css">
</head>
<body>
  <main class="shell">
    <header>
      <h1>Azure SignalR Refresh Auth Sample</h1>
      <p>
        Connect with a short-lived JWT, then exercise the refresh-auth flow:
        the app server reissues a token with an extended <code>exp</code> claim and the SignalR
        connection is kept alive past the original expiration.
      </p>
    </header>

    <section class="panel">
      <label>
        <span>User id</span>
        <input id="userId" value="alice" autocomplete="off">
      </label>
      <label>
        <span>Role</span>
        <input id="role" value="operator" autocomplete="off">
      </label>
      <label>
        <span>Hub URL</span>
        <input id="hubUrl" value="http://localhost:5121/hub" autocomplete="off">
      </label>
      <div class="actions">
        <button id="connect">Connect</button>
        <button id="disconnect" disabled>Disconnect</button>
        <button id="toggleCloseOnAuthExp" type="button" aria-pressed="true"
          title="Toggle HttpConnectionDispatcherOptions.CloseOnAuthenticationExpiration on the server. Takes effect at the next negotiate (reconnect to apply).">
          CloseOnAuthExp: ON
        </button>
      </div>
    </section>

    <section class="panel refresh-grid">
      <label>
        <span>Extend by (seconds)</span>
        <input id="extendSeconds" value="60" type="number" min="10" max="3600" autocomplete="off">
      </label>
      <button id="refreshAuthRest" disabled title="POST /api/refresh?mode=transient&hub=ChatHub&id={connectionToken} (spec §3, Transient). The app server signs an HS256 service token, POSTs to the ASRS data-plane /:refresh endpoint, and returns { accessToken, tokenLifetimeSeconds, mode }. The service advances AuthenticationExpiresOn in place — no client reconnect.">Refresh (Transient / REST)</button>
      <button id="refreshAuthPersistent" disabled title="POST /api/refresh?mode=persistent&hub=ChatHub&id={connectionToken} (spec §3, Persistent). The app server writes a RefreshAuthMessage onto the SDK's existing persistent service connection and awaits AckMessage. The service advances AuthenticationExpiresOn in place — no client reconnect.">Refresh (Persistent / service connection)</button>
      <span id="countdown" class="countdown">exp in --s</span>
    </section>

    <section class="panel message-grid">
      <label>
        <span>Target user id</span>
        <input id="targetUserId" value="alice" autocomplete="off">
      </label>
      <label>
        <span>Message</span>
        <input id="message" value="hello Azure SignalR user" autocomplete="off">
      </label>
      <button id="sendToUser" disabled>Send to user</button>
      <button id="sendToSelf" disabled>Send to self</button>
      <button id="sendToAll" disabled>Send to all</button>
    </section>

    <section class="status" aria-live="polite">
      <span id="state">Disconnected</span>
      <span id="connectionId"></span>
    </section>

    <pre id="token" class="log token-log"></pre>

    <pre id="log" class="log"></pre>
  </main>

  <script src="https://unpkg.com/@microsoft/signalr@10.0.0/dist/browser/signalr.min.js"></script>
  <script type="module" src="./client.js"></script>
</body>
</html>
